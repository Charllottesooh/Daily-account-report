<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>현금/예금 일일보고 수정본</title>
    <style>
        /* 1. 구분에 따른 색상 및 스타일 정의 */
        .type-select {
            padding: 5px;
            font-weight: bold;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }
        /* 매출 행 배경색 (연한 파랑) */
        .row-sales { background-color: #f0f7ff !important; }
        .row-sales select { color: #0056b3; }
        
        /* 매입 행 배경색 (연한 빨강) */
        .row-purchase { background-color: #fff5f5 !important; }
        .row-purchase select { color: #d63031; }

        /* 입력창 스타일 */
        .editable-input {
            width: 95%;
            padding: 4px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #aaa; padding: 8px; text-align: center; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

    <h3>01 매출 현황 (수정본)</h3>
    <table id="salesTable">
        <thead>
            <tr>
                <th>구분</th>
                <th>상세내역</th> <th>항목</th>
                <th>전잔액(누계)</th>
                <th>당일 매출/입금</th>
                <th>누계 합산</th>
                <th>비고</th>
            </tr>
        </thead>
        <tbody id="salesTbody">
            <tr class="row-sales">
                <td>
                    <select class="type-select" onchange="handleTypeChange(this)">
                        <option value="매출" selected>매출</option>
                        <option value="매입">매입</option>
                    </select>
                </td>
                <td>
                    <input type="text" class="editable-input" placeholder="내용 입력">
                </td>
                <td><input type="text" class="editable-input"></td>
                <td>0</td>
                <td>0</td>
                <td>0</td>
                <td>-</td>
            </tr>
        </tbody>
    </table>

    <script>
        // 구분에 따라 행 색상을 변경하는 함수
        function handleTypeChange(selectElement) {
            const row = selectElement.closest('tr');
            if (selectElement.value === "매출") {
                row.className = "row-sales";
            } else {
                row.className = "row-purchase";
            }
        }

        // 행 추가 버튼이 있다면 사용될 함수 예시
        function addRow() {
            const tbody = document.getElementById('salesTbody');
            const newRow = document.createElement('tr');
            newRow.className = "row-sales";
            newRow.innerHTML = `
                <td>
                    <select class="type-select" onchange="handleTypeChange(this)">
                        <option value="매출">매출</option>
                        <option value="매입">매입</option>
                    </select>
                </td>
                <td><input type="text" class="editable-input" placeholder="내용 입력"></td>
                <td><input type="text" class="editable-input"></td>
                <td>0</td>
                <td>0</td>
                <td>0</td>
                <td>-</td>
            `;
            tbody.appendChild(newRow);
        }
    </script>
</body>
</html>
