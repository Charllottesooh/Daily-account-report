
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일일시재보고</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pri:#1a56db;--prl:#e8f0fe;--prd:#0f3a9a;
  --ok:#0d9f6e;--okl:#e6f9f1;
  --err:#e02424;--erl:#fde8e8;
  --wrn:#c27803;--wrl:#fdf6e3;
  --sid:#0a2e23;--si2:#164d38;
  --bg:#f8fafc;--ca:#fff;--bd:#e2e8f0;
  --tx:#1e293b;--mu:#64748b;--lt:#94a3b8;
  --r:8px;--r2:12px
}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:218px;background:var(--sid);flex-shrink:0;display:flex;flex-direction:column}
.slogo{padding:16px;border-bottom:1px solid #164d38}
.slogo h1{color:#fff;font-size:14px;font-weight:800;letter-spacing:-.3px}
.slogo span{color:#34d399;font-size:10px;display:block;margin-top:3px}
.snav{flex:1;padding:8px 0;overflow-y:auto}
.nsec{padding:9px 16px 3px;font-size:10px;font-weight:700;color:#4a9e7a;text-transform:uppercase;letter-spacing:.7px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;color:var(--lt);font-size:12px;transition:all .15s;border-left:3px solid transparent}
.ni:hover{background:var(--si2);color:#e2e8f0}
.ni.active{background:rgba(16,185,129,.15);color:#fff;border-left-color:#10b981}
.nico{width:15px;text-align:center;font-size:13px}
.sbot{padding:12px 16px;border-top:1px solid #164d38}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--ca);border-bottom:1px solid var(--bd);padding:0 18px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tbtl{font-size:15px;font-weight:800}
.tba{display:flex;gap:6px;align-items:center}
.content{flex:1;overflow-y:auto;padding:18px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:var(--r);font-size:12px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap;font-family:inherit}
.bp{background:var(--pri);color:#fff}.bp:hover{background:var(--prd)}
.bs{background:var(--ca);color:var(--tx);border-color:var(--bd)}.bs:hover{background:var(--bg)}
.bok{background:var(--ok);color:#fff}.bok:hover{background:#065f46}
.ber{background:var(--err);color:#fff}.ber:hover{background:#991b1b}
.bw{background:var(--wrn);color:#fff}
.bgh{background:none;border:1px solid var(--bd);color:var(--mu)}.bgh:hover{background:var(--bg)}
/* 매출(빨간)/입금(파란) 특수버튼 */
.btn-sale{background:#e02424;color:#fff;font-size:13px;padding:8px 20px;font-weight:800}
.btn-sale:hover{background:#991b1b}
.btn-deposit{background:#1a56db;color:#fff;font-size:13px;padding:8px 20px;font-weight:800}
.btn-deposit:hover{background:#0f3a9a}
.card{background:var(--ca);border:1px solid var(--bd);border-radius:var(--r2)}
.ch{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.ct{font-size:13px;font-weight:800}
.cb{padding:15px}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.sc{background:var(--ca);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 16px}
.sl{font-size:11px;color:var(--mu);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.sv{font-size:20px;font-weight:800}
.sv.bl{color:var(--pri)}.sv.gn{color:var(--ok)}.sv.rd{color:var(--err)}.sv.og{color:var(--wrn)}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.4px}
.fi,.fs,.fta{border:1px solid var(--bd);border-radius:6px;padding:7px 10px;font-size:13px;color:var(--tx);background:var(--ca);width:100%;outline:none;font-family:inherit}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.fta{resize:vertical;min-height:60px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:#f8fafc}
th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd)}
td{padding:9px 10px;border-bottom:1px solid var(--bd);color:var(--tx);vertical-align:middle}
tbody tr:hover{background:#f8fafc}
tbody tr.row-empty{background:#fff!important}
tbody tr.row-empty:hover{background:#f8fafc}
tbody tr:last-child td{border-bottom:none}
.tr{text-align:right}.tc{text-align:center}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.bbl{background:var(--prl);color:#0f3a9a}
.bgn{background:var(--okl);color:#065f46}
.brd{background:var(--erl);color:#991b1b}
.bog{background:var(--wrl);color:#92400e}
.bgy{background:#f1f5f9;color:var(--mu)}
.moverlay{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:28px 16px;overflow-y:auto}
.modal{background:var(--ca);border-radius:16px;width:100%}
.msm{max-width:440px}.mmd{max-width:620px}.mlg{max-width:820px}.mxl{max-width:1000px}
.mh{padding:15px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--ca);z-index:1;border-radius:16px 16px 0 0}
.mt2{font-size:14px;font-weight:800}
.mb2{padding:20px}
.mf{padding:12px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:6px}
.xbtn{background:none;border:none;cursor:pointer;font-size:20px;color:var(--mu);line-height:1;padding:2px;font-family:inherit}
.g2{display:grid;gap:11px}
.g22{grid-template-columns:1fr 1fr}
.g23{grid-template-columns:1fr 1fr 1fr}
.g24{grid-template-columns:1fr 1fr 1fr 1fr}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.flex{display:flex}.gap6{gap:6px}.gap8{gap:8px}.gap12{gap:12px}.aic{align-items:center}.jb{justify-content:space-between}.f1{flex:1}.fw{flex-wrap:wrap}
.bold{font-weight:700}.tmuted{color:var(--mu)}.tsm{font-size:11px}
/* 날짜 선택바 */
.datebar{display:flex;gap:8px;align-items:center;background:var(--ca);border:1px solid var(--bd);border-radius:var(--r2);padding:10px 14px;margin-bottom:14px;flex-wrap:wrap}
.datebar label{font-size:12px;font-weight:700;color:var(--mu)}
.datebar input[type=date],.datebar input[type=month]{border:1px solid var(--bd);border-radius:6px;padding:6px 10px;font-size:12px;color:var(--tx);background:var(--ca);outline:none;font-family:inherit}
.datebar input:focus{border-color:var(--pri)}
/* 코드 배지 */
.code-badge{background:#f1f5f9;color:var(--mu);font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;font-family:monospace}
/* 금액 색상 */
.amt-in{color:var(--pri);font-weight:700}
.amt-out{color:var(--err);font-weight:700}
.amt-bal{color:var(--ok);font-weight:700}
/* 대출 위험도 */
.risk-high{color:var(--err);font-weight:700}
.risk-mid{color:var(--wrn);font-weight:700}
.risk-ok{color:var(--ok);font-weight:700}
/* 사파이어그린 사이드바 전용 */
.sidebar{background:linear-gradient(180deg,#0a2e23 0%,#0d3d2e 100%)}
.ni:hover{background:rgba(16,185,129,.12);color:#e2e8f0}
.ni.active{background:rgba(16,185,129,.18);color:#fff;border-left-color:#10b981}
.slogo{background:transparent;border-bottom:1px solid rgba(16,185,129,.2)}
.snav .nsec{color:#4a9e7a}
.sbot{border-top:1px solid rgba(16,185,129,.2)}
/* 리포트 */
.report-section{margin-bottom:20px}
.report-title{font-size:13px;font-weight:800;color:var(--tx);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--pri)}
@media(max-width:768px){.sidebar{width:52px}.slogo h1,.slogo span,.ni span,.nsec,.sbot span{display:none}.sgrid{grid-template-columns:repeat(2,1fr)}.g22,.g23,.g24{grid-template-columns:1fr}}
/* ===== 화면에서 인쇄헤더/푸터/페이지번호 숨김 ===== */
.print-header,.print-footer,.print-page-num{display:none}

/* ===== 인쇄 전용 스타일 ===== */
@media print{

  /* 페이지 설정: A4 가로, 모든 여백 포함 헤더/푸터 공간 확보 */
  @page{
    size:A4 landscape;
    margin:18mm 10mm 18mm 10mm;
  }

  /* 색상 강제 출력 */
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}

  /* 화면 전용 요소 숨김 */
  .sidebar,.topbar,.no-print,.datebar,.btn{display:none!important}

  /* 기본 레이아웃 */
  body{background:#fff;font-size:10px;margin:0;padding:0}
  html,body{width:100%}
  .app{display:block;width:100%}
  .main{width:100%;overflow:visible;display:block}
  .content{padding:0;width:100%;overflow:visible}

  /* ---- 페이지마다 반복되는 헤더 (running header) ---- */
  .print-header{
    display:block!important;
    text-align:center;
    padding-bottom:8px;
    border-bottom:2px solid #0a2e23;
    margin-bottom:10px;
    /* 모든 페이지 상단에 반복 출력 */
    position:running(pageHeader);
  }
  .print-header h1{font-size:18px;font-weight:900;color:#0a2e23;letter-spacing:1px;margin:0}
  .print-header .print-subtitle{font-size:12px;color:#475569;margin-top:3px}
  .print-header .print-date{font-size:11px;color:#64748b;margin-top:2px}
  .print-header .print-date b{color:#1a56db!important;font-size:13px;font-weight:900}

  /* 헤더가 페이지마다 나오도록 thead 활용 */
  .print-table-header{display:table-header-group}

  /* ---- 하단 페이지 번호 ---- */
  .print-footer{
    display:block!important;
    text-align:center;
    font-size:9px;
    color:#94a3b8;
    padding-top:6px;
    border-top:1px solid #e2e8f0;
    margin-top:8px;
  }
  .print-footer::after{
    content:" | 페이지 " counter(page) " / " counter(pages);
    font-weight:700;
    color:#475569;
  }

  /* ---- 테이블 양쪽 맞춤 (컬럼 꽉 채움) ---- */
  .tw{overflow:visible!important;width:100%}
  table{
    width:100%!important;
    table-layout:fixed!important;
    border-collapse:collapse;
    font-size:9px!important;
  }
  /* 비고 컬럼 너비 줄이고 나머지 자동 배분 */
  th,td{
    font-size:9px!important;
    padding:4px 4px!important;
    word-break:break-all;
    overflow:hidden;
  }
  /* 숫자 컬럼 우측 정렬 유지 */
  .tr{text-align:right!important}
  .tc{text-align:center!important}

  /* ---- 카드/그리드 ---- */
  .card{border:1px solid #ccc;border-radius:3px;margin-bottom:6px;page-break-inside:avoid}
  .sgrid{display:grid!important;grid-template-columns:repeat(4,1fr)!important;gap:6px!important}
  .sc{padding:6px 8px}
  .sv{font-size:14px}
  .g2{gap:6px}
  .g22{grid-template-columns:1fr 1fr}

  /* ---- 배지/코드 ---- */
  .code-badge{font-size:8px;padding:1px 3px;background:#f1f5f9;border-radius:2px}
  .badge{font-size:8px;padding:1px 4px;border-radius:10px}

  /* ---- 행 배경 ---- */
  tbody tr{background:#fff!important}
  tbody tr.row-empty{background:#fff!important}
  tfoot tr{background:#f0f7ff!important}

  /* 페이지 분리 */
  .card.page-break{page-break-before:always}

  /* thead 모든 페이지 반복 */
  thead{display:table-header-group!important}
  tfoot{display:table-footer-group!important}

  /* 비고 컬럼 가로폭 제한 - 공란 최소화 */
  th:last-child,td:last-child{width:60px!important;min-width:30px!important}

  /* 전체 테이블 양쪽 맞춤 강제 */
  .card .tw table{table-layout:auto!important}
  .card .tw{width:100%!important}
}
</style>
</head>
<body>
<div class="app" id="app">
<div class="sidebar">
  <div class="slogo" style="background:linear-gradient(135deg,#0a2e23,#164d38)">
    <h1>일일시재보고</h1>
    <span>Daily Cash Report v1.0</span>
  </div>
  <nav class="snav">
    <div class="nsec">메인</div>
    <div class="ni active" data-p="dash" onclick="go('dash')"><span class="nico">📊</span><span>대시보드</span></div>
    <div class="nsec">기초설정</div>
    <div class="ni" data-p="accounts" onclick="go('accounts')"><span class="nico">🏦</span><span>계좌내역</span></div>
    <div class="ni" data-p="loans" onclick="go('loans')"><span class="nico">💳</span><span>대출내역</span></div>
    <div class="nsec">일일입력</div>
    <div class="ni" data-p="sales" onclick="go('sales')"><span class="nico">💰</span><span>매출/입금</span></div>
    <div class="ni" data-p="deposits" onclick="go('deposits')"><span class="nico">🏧</span><span>예금내역</span></div>
    <div class="nsec">조회</div>
    <div class="ni" data-p="report" onclick="go('report')"><span class="nico">📋</span><span>월별 리포트</span></div>
    <div class="nsec">데이터</div>
    <div class="ni" onclick="doExport()"><span class="nico">📤</span><span>엑셀저장</span></div>
    <div class="ni" onclick="trigImp()"><span class="nico">📥</span><span>불러오기</span></div>
    <div class="ni" data-p="settings" onclick="go('settings')"><span class="nico">⚙</span><span>설정</span></div>
  </nav>
  <div class="sbot">
    <div style="font-size:11px;color:var(--lt)">일일시재보고 v1.0</div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="tbtl" id="ptitle">대시보드</div>
    <div class="tba">
      <span id="today-display" style="font-size:12px;color:var(--mu)"></span>
      <button class="btn bs no-print" style="font-size:11px;padding:5px 9px" onclick="window.print()">🖨 인쇄</button>
      <button class="btn bs no-print" style="font-size:11px;padding:5px 9px;color:var(--ok)" onclick="saveAsImage()">🖼 이미지저장</button>
      <button class="btn bs no-print" style="font-size:11px;padding:5px 9px" onclick="doExport()">📤 엑셀</button>
      <input type="file" id="impf" accept=".xlsx,.xls" style="display:none" onchange="handleImp(event)">
    </div>
  </div>
  <div class="content" id="pcont"></div>
</div>
</div>
<div id="mc"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ═══ DB ═══
let DB={
  accounts:[],   // 계좌내역
  loans:[],      // 대출내역
  sales:[],      // 매출/입금내역
  deposits:[],   // 예금내역
  settings:{company:'', gs_script:'', gs_auto:false, gs_interval:30}
};

function ldDB(){try{const s=localStorage.getItem('sijae_v1');if(s)DB=JSON.parse(s);if(!DB.settings)DB.settings={company:'',gs_script:'',gs_auto:false,gs_interval:30};}catch(e){}}
function svDB(){try{localStorage.setItem('sijae_v1',JSON.stringify(DB));}catch(e){}}

// ═══ HELPERS ═══
const fmt=n=>Number(n||0).toLocaleString('ko-KR');
const fmtM=n=>{const v=Math.abs(Number(n||0));return(n<0?'-':'')+v.toLocaleString('ko-KR');};
const gid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const today=()=>new Date().toISOString().slice(0,10);
const todayYM=()=>new Date().toISOString().slice(0,7);

// 코드 자동생성
function nextCode(arr,prefix){
  const nums=arr.map(a=>parseInt((a.code||'').replace(prefix,''))||0);
  const max=nums.length?Math.max(...nums):0;
  return prefix+String(max+1).padStart(3,'0');
}

// 전일 예금잔액 조회
function getPrevBalance(accountId, date, excludeId){
  // 1순위: 당일 같은 계좌의 마지막 건 최종잔액 (seq 순번 기준 정렬)
  const sameDay=DB.deposits
    .filter(d=>d.account_id===accountId && d.date===date && d.id!==excludeId)
    .sort((a,b)=>(a.seq||0)-(b.seq||0));
  if(sameDay.length>0) return sameDay[sameDay.length-1].final_balance||0;
  // 2순위: 전날 이전 가장 최근 건의 최종잔액 (날짜+seq 기준)
  const prev=DB.deposits
    .filter(d=>d.account_id===accountId && d.date<date)
    .sort((a,b)=>b.date.localeCompare(a.date)||(b.seq||0)-(a.seq||0));
  if(prev.length>0) return prev[0].final_balance||0;
  // 3순위: 계좌 기초잔액
  const acc=DB.accounts.find(a=>a.id===accountId);
  return acc?acc.initial_balance||0:0;
}

// 당일 예금 최종잔액 (seq 기준 마지막 건)
function getTodayBalance(accountId, date){
  const todays=DB.deposits
    .filter(d=>d.account_id===accountId && d.date===date)
    .sort((a,b)=>(a.seq||0)-(b.seq||0));
  if(todays.length>0) return todays[todays.length-1].final_balance||0;
  return getPrevBalance(accountId,date);
}

// 당일 계좌의 다음 seq 번호
function nextSeq(accountId, date){
  const todays=DB.deposits.filter(d=>d.account_id===accountId && d.date===date);
  return todays.length>0?Math.max(...todays.map(d=>d.seq||0))+1:1;
}

// ═══ NAVIGATION ═══
let PAGE='dash';
const TITLES={dash:'대시보드',accounts:'계좌내역',loans:'대출내역',sales:'매출/입금내역',deposits:'예금내역',report:'월별 리포트',settings:'설정'};

function go(page){
  PAGE=page;
  document.querySelectorAll('.ni').forEach(e=>e.classList.remove('active'));
  document.querySelector(`.ni[data-p="${page}"]`)?.classList.add('active');
  document.getElementById('ptitle').textContent=TITLES[page]||page;
  rc();
}
function rc(){
  const el=document.getElementById('pcont');
  const R={dash:rDash,accounts:rAccounts,loans:rLoans,sales:rSales,deposits:rDeposits,report:rReport,settings:rSettings};
  const pageContent=(R[PAGE]||rDash)();
  const titleMap={dash:'대시보드',accounts:'계좌내역',loans:'대출내역',sales:'매출/입금내역',deposits:'예금내역',report:'월별 리포트',settings:'설정'};
  const pageTitle=titleMap[PAGE]||PAGE;
  const printHeader=`<div class="print-header">
    <h1>일일시재보고</h1>
    <div class="print-subtitle">${pageTitle}</div>
    <div class="print-date">조회일자: <b>${SEL_DATE}</b> &nbsp;|&nbsp; 출력일시: ${new Date().toLocaleString('ko-KR')} &nbsp;|&nbsp; ${DB.settings.company||''}</div>
  </div>`;
  const printFooter=`<div class="print-footer">일일시재보고 &copy; ${new Date().getFullYear()} &nbsp;|&nbsp; ${pageTitle}</div>`;
  el.innerHTML=printHeader+pageContent+printFooter;
}

// ═══ DATE BAR ═══
let SEL_DATE=today();
let SEL_YM=todayYM();

function rDateBar(){
  return`<div class="datebar no-print">
    <label>조회날짜</label>

    bank_name:bank,
    account_no:document.getElementById('ac-no').value,
    alias:document.getElementById('ac-alias').value,

function delAcc(id){

  DB.accounts=DB.accounts.filter(a=>a.id!==id);

  svDB();rc();
}

      </tr>`).join(''):'<tr><td colspan="8" class="tc tmuted" style="padding:24px">당일 내역 없음</td></tr>'}
      </tbody>
      ${list.length?`<tfoot style="background:#f0f7ff"><tr>
        <td colspan="6" style="padding:7px 10px;font-weight:700">합계</td>
        <td class="tr" style="padding:7px 10px;font-weight:700;color:var(--ok)">${fmt(list[list.length-1]?.final_balance||0)}</td>
        <td></td>
      </tr></tfoot>`:''}
    </table></div>
  </div>`;
}

function showSaleModal(type, id){
  const s=id&&typeof id==='string'&&id.length>3?DB.sales.find(x=>x.id===id):null;
  const isEdit=!!s;
  const isSale=type==='sale';
  openM('mmd',isEdit?(isSale?'매출 수정':'입금 수정'):(isSale?'🔴 매출 입력':'🔵 입금 입력'),`
    <div class="g2 g22">
      <div class="fg"><label class="fl">날짜 *</label><input class="fi" id="sl-date" type="date" value="${s?s.date:SEL_DATE}"></div>
      <div class="fg"><label class="fl">은행명</label><input class="fi" id="sl-bank" value="${s?s.bank_name||'':''}" placeholder="은행명"></div>
      <div class="fg"><label class="fl">계좌번호</label><input class="fi" id="sl-no" value="${s?s.account_no||'':''}" placeholder="계좌번호"></div>
      <div class="fg"><label class="fl">항목 *</label><input class="fi" id="sl-item" value="${s?s.item||'':''}" placeholder="예: 현금매출, 카드매출"></div>
      <div class="fg"><label class="fl">전일잔액 (원)</label><input class="fi" id="sl-prev" type="text" inputmode="numeric" value="${s?fmt(s.prev_balance||0):''}" placeholder="0" onchange="this.value=this.value.replace(/,/g,'');calcSaleFinal()"></div>
      <div class="fg"><label class="fl">${isSale?'매출':'입금'}금액 (원) *</label><input class="fi" id="sl-amt" type="text" inputmode="numeric" value="${s?fmt(s.amount||0):''}" placeholder="0" onchange="this.value=this.value.replace(/,/g,'');calcSaleFinal()"></div>
      <div class="fg" style="grid-column:1/-1"><label class="fl">최종잔액 (원)</label><input class="fi" id="sl-final" type="text" inputmode="numeric" value="${s?fmt(s.final_balance||0):''}" placeholder="자동계산" style="background:#f8fafc"></div>
    </div>`,
    `<button class="btn bs" onclick="closeM()">취소</button><button class="btn ${isSale?'ber':'bp'}" onclick="saveSale('${type}','${s?s.id:''}')">저장</button>`
  );
}

function calcSaleFinal(){
  const prev=parseFloat((document.getElementById('sl-prev')?.value||'0').replace(/,/g,''))||0;
  const amt=parseFloat((document.getElementById('sl-amt')?.value||'0').replace(/,/g,''))||0;
  const finalEl=document.getElementById('sl-final');
  if(finalEl) finalEl.value=fmt(prev+amt);
}

function saveSale(type,id){
  const date=document.getElementById('sl-date').value;
  const item=document.getElementById('sl-item').value.trim();
  const amount=parseFloat(document.getElementById('sl-amt').value.replace(/,/g,''))||0;
  if(!date||!item||!amount){alert('날짜, 항목, 금액을 입력하세요');return;}
  const d={
    date,type,
    bank_name:document.getElementById('sl-bank').value,
    account_no:document.getElementById('sl-no').value,
    item,
    prev_balance:parseFloat(document.getElementById('sl-prev').value.replace(/,/g,''))||0,
    amount,
    final_balance:parseFloat(document.getElementById('sl-final').value.replace(/,/g,''))||0,
    created_at:new Date().toISOString()
  };
  if(id){Object.assign(DB.sales.find(x=>x.id===id),d);}
  else{DB.sales.push({id:gid(),...d});}
  svDB();closeM();rc();
}
function delSale(id){
  if(!confirm('삭제하시겠습니까?'))return;
  DB.sales=DB.sales.filter(s=>s.id!==id);svDB();rc();
}

      const dayDeps=DB.deposits.filter(d=>d.account_id===a.id&&d.date===SEL_DATE).sort((x,y)=>(x.seq||0)-(y.seq||0));
      if(dayDeps.length===0){
        const prev=getPrevBalance(a.id,SEL_DATE);
        return`<tr class="row-empty">

          <td><b>${a.bank_name}</b></td><td class="tsm tmuted">${a.account_no||''}</td>
          <td class="tsm tmuted tc">-</td>
          <td class="tr tmuted">${fmt(prev)}</td>
          <td class="tr">-</td><td class="tr">-</td>
          <td class="tr tmuted">${fmt(prev)}</td>
          <td class="tsm tmuted">-</td><td class="tsm tmuted">-</td>
          <td class="tc no-print"><button class="btn bp" style="font-size:10px;padding:3px 7px" onclick="showDepModal('${a.id}')">입력</button></td>
        </tr>`;
      }
      return dayDeps.map((d,idx)=>`<tr>
        ${idx===0?`<td rowspan="${dayDeps.length}"><span class="code-badge">${a.code}</span></td>
          <td rowspan="${dayDeps.length}"><b>${a.bank_name}</b></td>
          <td rowspan="${dayDeps.length}" class="tsm tmuted">${a.account_no||''}</td>`:''}
        <td class="tsm tc">${d.memo_type||'-'}</td>
        <td class="tr tmuted">${fmt(d.prev_balance)}</td>
        <td class="tr amt-in">${d.in_amount?fmt(d.in_amount):'-'}</td>
        <td class="tr amt-out">${d.out_amount?fmt(d.out_amount):'-'}</td>
        <td class="tr amt-bal">${fmt(d.final_balance)}</td>
        <td class="tsm">${d.detail||'-'}</td>
        <td class="tsm tmuted">${d.memo||'-'}</td>
        <td class="tc no-print"><button class="btn bs" style="font-size:10px;padding:3px 6px;margin-right:2px" onclick="showDepModal('${a.id}','${d.id}')">수정</button><button class="btn ber" style="font-size:10px;padding:3px 6px" onclick="delDep('${d.id}')">삭제</button></td>
      </tr>`).join('');
    }).join(''):'<tr><td colspan="11" class="tc tmuted" style="padding:26px">계좌를 먼저 등록해주세요</td></tr>'}
    </tbody>
    <tfoot style="background:#f0f7ff">
      <tr>
        <td colspan="4" style="padding:7px 10px;font-weight:700">합계</td>
        <td class="tr" style="padding:7px 10px;font-weight:700">${(()=>{
          // 전잔액 합계: 각 계좌의 당일 첫 번째 건의 전잔액, 없으면 전일 최종잔액
          return fmt(accList.reduce((s,a)=>{
            const firstDep=DB.deposits.filter(d=>d.account_id===a.id&&d.date===SEL_DATE).sort((x,y)=>(x.seq||0)-(y.seq||0))[0];
            return s+(firstDep?firstDep.prev_balance:getPrevBalance(a.id,SEL_DATE,''));
          },0));
        })()}</td>
        <td class="tr" style="padding:7px 10px;font-weight:700;color:var(--pri)">${fmt(DB.deposits.filter(d=>d.date===SEL_DATE).reduce((s,d)=>s+(d.in_amount||0),0))}</td>
        <td class="tr" style="padding:7px 10px;font-weight:700;color:var(--err)">${fmt(DB.deposits.filter(d=>d.date===SEL_DATE).reduce((s,d)=>s+(d.out_amount||0),0))}</td>

function showDepModal(accId, depId){
  const dep=depId?DB.deposits.find(x=>x.id===depId):null;
  const acc=accId?DB.accounts.find(x=>x.id===accId):null;
  // 전잔액 자동세팅
  const prevBal=dep?dep.prev_balance:getPrevBalance(accId,SEL_DATE,'');
  openM('mmd',dep?'예금내역 수정':'예금 입력',`
    <div class="g2 g22">
      <div class="fg"><label class="fl">날짜 *</label><input class="fi" id="dp-date" type="date" value="${dep?dep.date:SEL_DATE}" onchange="autoSetPrevBal('${dep?dep.id:''}')"></div>
      <div class="fg"><label class="fl">계좌 *</label>
        <select class="fs" id="dp-acc" onchange="autoSetPrevBal('${dep?dep.id:''}')">
          <option value="">계좌 선택</option>
          ${[...DB.accounts].sort((a,b)=>a.code.localeCompare(b.code)).map(a=>`<option value="${a.id}" ${(dep?dep.account_id:accId)===a.id?'selected':''}>[${a.code}] ${a.bank_name} ${a.alias?'('+a.alias+')':''}</option>`).join('')}
        </select>
      </div>
      <div class="fg"><label class="fl">비고 유형</label><input class="fi" id="dp-mtype" value="${dep?dep.memo_type||'':''}" placeholder="예: 이체, 현금, 카드"></div>
      <div class="fg"><label class="fl">전잔액 (자동세팅)</label><input class="fi" id="dp-prev" type="text" inputmode="numeric" value="${fmt(prevBal)}" onchange="this.value=this.value.replace(/,/g,'');calcDepFinal()"></div>
      <div class="fg"><label class="fl">입금 (원)</label><input class="fi" id="dp-in" type="text" inputmode="numeric" value="${dep?fmt(dep.in_amount||0):''}" placeholder="0" onchange="this.value=this.value.replace(/,/g,'');calcDepFinal()"></div>
      <div class="fg"><label class="fl">출금 (원)</label><input class="fi" id="dp-out" type="text" inputmode="numeric" value="${dep?fmt(dep.out_amount||0):''}" placeholder="0" onchange="this.value=this.value.replace(/,/g,'');calcDepFinal()"></div>
      <div class="fg" style="grid-column:1/-1"><label class="fl">최종잔액 (자동계산)</label><input class="fi" id="dp-final" type="text" inputmode="numeric" value="${dep?fmt(dep.final_balance||0):fmt(prevBal)}" style="background:#f0f7ff;font-weight:700" onchange="this.value=this.value.replace(/,/g,'')"></div>
      <div class="fg"><label class="fl">상세내역</label><input class="fi" id="dp-detail" value="${dep?dep.detail||'':''}" placeholder="거래 상세내용"></div>
      <div class="fg"><label class="fl">비고</label><input class="fi" id="dp-memo" value="${dep?dep.memo||'':''}" placeholder="메모"></div>
    </div>`,
    `<button class="btn bs" onclick="closeM()">취소</button><button class="btn bp" onclick="saveDep('${dep?dep.id:''}')">저장</button>`
  );
}

function autoSetPrevBal(excludeId){
  const accId=document.getElementById('dp-acc')?.value;
  const date=document.getElementById('dp-date')?.value||SEL_DATE;
  if(!accId)return;
  const prev=getPrevBalance(accId,date,excludeId||'');
  const prevEl=document.getElementById('dp-prev');
  const finalEl=document.getElementById('dp-final');
  if(prevEl){
    prevEl.value=fmt(prev);
    // 입금/출금이 비어있으면 최종잔액도 전잔액으로 초기화
    const inA=parseFloat((document.getElementById('dp-in')?.value||'0').replace(/,/g,''))||0;
    const outA=parseFloat((document.getElementById('dp-out')?.value||'0').replace(/,/g,''))||0;
    if(finalEl&&inA===0&&outA===0) finalEl.value=fmt(prev);
    calcDepFinal();
  }
}

function calcDepFinal(){
  const prev=parseFloat((document.getElementById('dp-prev')?.value||'0').replace(/,/g,''))||0;
  const inA=parseFloat((document.getElementById('dp-in')?.value||'0').replace(/,/g,''))||0;
  const outA=parseFloat((document.getElementById('dp-out')?.value||'0').replace(/,/g,''))||0;
  const finalEl=document.getElementById('dp-final');
  if(finalEl) finalEl.value=fmt(prev+inA-outA);
}

function saveDep(id){
  const date=document.getElementById('dp-date').value;
  const account_id=document.getElementById('dp-acc').value;
  if(!date||!account_id){alert('날짜와 계좌를 선택하세요');return;}
  const d={
    date,account_id,
    memo_type:document.getElementById('dp-mtype').value,
    prev_balance:parseFloat(document.getElementById('dp-prev').value.replace(/,/g,''))||0,
    in_amount:parseFloat(document.getElementById('dp-in').value.replace(/,/g,''))||0,
    out_amount:parseFloat(document.getElementById('dp-out').value.replace(/,/g,''))||0,
    final_balance:parseFloat(document.getElementById('dp-final').value.replace(/,/g,''))||0,
    detail:document.getElementById('dp-detail').value,
    memo:document.getElementById('dp-memo').value,
    created_at:new Date().toISOString()
  };
  if(id){
    Object.assign(DB.deposits.find(x=>x.id===id),d);
  }else{
    // 신규 입력 시 seq 자동 부여 (당일 해당 계좌의 마지막 번호 + 1)
    d.seq=nextSeq(d.account_id, d.date);
    DB.deposits.push({id:gid(),...d});
  }
  svDB();closeM();rc();
}
function delDep(id){
  if(!confirm('삭제하시겠습니까?'))return;
  DB.deposits=DB.deposits.filter(d=>d.id!==id);svDB();rc();
}

// ═══ REPORT (월별 리포트) ═══
function rReport(){
  const ym=document.getElementById('rpt-ym')?document.getElementById('rpt-ym').value:SEL_YM;
  const from=ym+'-01';
  const de=new Date(ym+'-01');de.setMonth(de.getMonth()+1);de.setDate(0);
  const to=de.toISOString().slice(0,10);

  const mSales=DB.sales.filter(s=>s.date>=from&&s.date<=to);
  const mDeps=DB.deposits.filter(d=>d.date>=from&&d.date<=to);
  const totalSale=mSales.filter(s=>s.type==='sale').reduce((s,x)=>s+(x.amount||0),0);
  const totalDep=mSales.filter(s=>s.type==='deposit').reduce((s,x)=>s+(x.amount||0),0);
  const totalIn=mDeps.reduce((s,d)=>s+(d.in_amount||0),0);
  const totalOut=mDeps.reduce((s,d)=>s+(d.out_amount||0),0);

  // 날짜별 그룹
  const byDate={};
  mSales.forEach(s=>{if(!byDate[s.date])byDate[s.date]={sales:0,deposits:0};if(s.type==='sale')byDate[s.date].sales+=s.amount;else byDate[s.date].deposits+=s.amount;});
  const dates=Object.keys(byDate).sort();

  return`<div class="flex gap8 aic fw no-print" style="margin-bottom:14px">
    <div class="fg"><label class="fl">월 선택</label><input type="month" class="fi" id="rpt-ym" value="${ym}" onchange="rc()" style="width:auto"></div>
    <button class="btn bp" style="align-self:flex-end" onclick="window.print()">🖨 인쇄</button>
  </div>

  <!-- 월 요약 -->
  <div class="sgrid" style="margin-bottom:16px">
    <div class="sc"><div class="sl">월 매출 합계</div><div class="sv rd">${fmt(totalSale)}<span style="font-size:10px;color:var(--mu)">원</span></div></div>
    <div class="sc"><div class="sl">월 입금 합계</div><div class="sv bl">${fmt(totalDep)}<span style="font-size:10px;color:var(--mu)">원</span></div></div>
    <div class="sc"><div class="sl">월 예금 입금</div><div class="sv gn">${fmt(totalIn)}<span style="font-size:10px;color:var(--mu)">원</span></div></div>
    <div class="sc"><div class="sl">월 예금 출금</div><div class="sv og">${fmt(totalOut)}<span style="font-size:10px;color:var(--mu)">원</span></div></div>
  </div>

  <!-- 일별 매출/입금 추이 -->
  <div class="card report-section" style="margin-bottom:14px"><div class="ch"><span class="ct">일별 매출/입금 현황 (${ym})</span></div>
    <div class="tw"><table>
      <thead><tr><th>날짜</th><th class="tr">매출</th><th class="tr">입금</th><th class="tr">합계</th><th class="tr">누계 매출</th><th class="tr">누계 입금</th></tr></thead>
      <tbody>${dates.length?dates.map((d,i)=>{
        const cumSale=dates.slice(0,i+1).reduce((s,dt)=>s+(byDate[dt]?.sales||0),0);
        const cumDep=dates.slice(0,i+1).reduce((s,dt)=>s+(byDate[dt]?.deposits||0),0);
        return`<tr>
          <td><b>${d}</b></td>
          <td class="tr amt-out">${byDate[d].sales?fmt(byDate[d].sales):'-'}</td>
          <td class="tr amt-in">${byDate[d].deposits?fmt(byDate[d].deposits):'-'}</td>
          <td class="tr bold">${fmt((byDate[d].sales||0)+(byDate[d].deposits||0))}</td>
          <td class="tr tmuted">${fmt(cumSale)}</td>
          <td class="tr tmuted">${fmt(cumDep)}</td>
        </tr>`;
      }).join(''):'<tr><td colspan="6" class="tc tmuted" style="padding:20px">해당 월 데이터 없음</td></tr>'}
      </tbody>
      ${dates.length?`<tfoot style="background:#f0f7ff"><tr>
        <td style="padding:7px 10px;font-weight:700">합계</td>
        <td class="tr" style="padding:7px 10px;font-weight:700;color:var(--err)">${fmt(totalSale)}</td>
        <td class="tr" style="padding:7px 10px;font-weight:700;color:var(--pri)">${fmt(totalDep)}</td>
        <td class="tr" style="padding:7px 10px;font-weight:700">${fmt(totalSale+totalDep)}</td>
        <td colspan="2"></td>
      </tr></tfoot>`:''}

  </div>

    <div class="tw"><table>
      <thead><tr><th>코드</th><th>은행명</th><th>별명</th><th class="tr">월초잔액</th><th class="tr">월 입금</th><th class="tr">월 출금</th><th class="tr">월말잔액</th></tr></thead>
      <tbody>${[...DB.accounts].sort((a,b)=>a.code.localeCompare(b.code)).map(a=>{
        const monthDeps=mDeps.filter(d=>d.account_id===a.id);
        const mIn=monthDeps.reduce((s,d)=>s+(d.in_amount||0),0);

      <tbody>${[...DB.loans].sort((a,b)=>a.code.localeCompare(b.code)).map(l=>{
        const dday=l.maturity_date?Math.ceil((new Date(l.maturity_date)-new Date())/86400000):null;
        return`<tr>
          <td><span class="code-badge">${l.code}</span></td>
          <td><b>${l.bank_name}</b></td>
          <td class="${dday!==null&&dday<90?'risk-high':dday!==null&&dday<180?'risk-mid':''}">${l.maturity_date||'-'}${dday!==null?` (D-${dday})`:''}</td>
          <td>${l.rate||'-'}%</td>
          <td class="tr">${fmt(l.loan_principal)}</td>
          <td class="tr tmuted">${fmt(l.interest_amount)}</td>

          <td class="tsm">${l.collateral||'-'}</td>
        </tr>`;
      }).join('')||'<tr><td colspan="8" class="tc tmuted" style="padding:16px">대출 없음</td></tr>'}
      </tbody>
      ${DB.loans.length?`<tfoot style="background:#fde8e8"><tr>
        <td colspan="4" style="padding:7px 10px;font-weight:700">합계</td>
        <td class="tr" style="padding:7px 10px;font-weight:700">${fmt(DB.loans.reduce((s,l)=>s+(l.loan_principal||0),0))}</td>
        <td class="tr" style="padding:7px 10px;font-weight:700">${fmt(DB.loans.reduce((s,l)=>s+(l.interest_amount||0),0))}</td>
        <td class="tr" style="padding:7px 10px;font-weight:700;color:var(--err)">${fmt(DB.loans.reduce((s,l)=>s+(l.loan_balance||0),0))}</td>
        <td></td>
      </tr></tfoot>`:''}
    </table></div>
  </div>`;
}

function svSet(){

  svDB();
  const msg=document.getElementById('gs-msg');
  if(msg){msg.textContent='✅ 저장되었습니다';msg.style.color='var(--ok)';setTimeout(()=>msg.textContent='',2000);}
  else alert('저장되었습니다.');

async function gsSync(){
  const url=DB.settings.gs_script;
  if(!url){alert('Apps Script URL을 먼저 설정해주세요');return;}
  const msg=document.getElementById('gs-msg');
  if(msg){msg.textContent='⏳ 동기화 중...';msg.style.color='var(--wrn)';}
  try{
    const payload={
      '계좌내역':[['코드','은행명','계좌번호','별명','기초잔액'],...DB.accounts.map(a=>[a.code,a.bank_name,a.account_no||'',a.alias||'',a.initial_balance||0])],
      '대출내역':[['코드','은행명','계좌번호','실행일','만기일','대출원금','금리','이자','대출잔액','담보','비고'],...DB.loans.map(l=>[l.code,l.bank_name,l.account_no||'',l.exec_date||'',l.maturity_date||'',l.loan_principal||0,l.rate||'',l.interest_amount||0,l.loan_balance||0,l.collateral||'',l.memo||''])],
      '매출입금':[['날짜','구분','은행명','계좌번호','항목','전잔액','금액','최종잔액'],...DB.sales.map(s=>[s.date,s.type==='sale'?'매출':'입금',s.bank_name||'',s.account_no||'',s.item||'',s.prev_balance||0,s.amount||0,s.final_balance||0])],
      '예금내역':[['날짜','계좌코드','은행명','유형','전잔액','입금','출금','최종잔액','상세','비고'],...DB.deposits.map(d=>{const acc=DB.accounts.find(a=>a.id===d.account_id);return[d.date,acc?acc.code:'',acc?acc.bank_name:'',d.memo_type||'',d.prev_balance||0,d.in_amount||0,d.out_amount||0,d.final_balance||0,d.detail||'',d.memo||''];})]
    };
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
    const d=await res.json();
    const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    if(msg){msg.textContent=d.status==='success'?`✅ 동기화 완료 ${now}`:'❌ 오류: '+(d.msg||'');msg.style.color=d.status==='success'?'var(--ok)':'var(--err)';}
  }catch(e){if(msg){msg.textContent='❌ 연결 실패: '+e.message;msg.style.color='var(--err)';}}
}

// ═══ IMAGE SAVE ═══
function saveAsImage(){
  const pageTitle=document.getElementById('ptitle')?.textContent||'일일시재보고';
  const fileName='일일시재보고_'+pageTitle+'_'+SEL_DATE+'.png';

  // 인쇄헤더/푸터 임시 표시
  const printHeaders=document.querySelectorAll('.print-header,.print-footer');
  printHeaders.forEach(el=>el.style.display='block');

  // 캡처 대상: pcont (콘텐츠 영역 전체)
  const target=document.getElementById('pcont');
  if(!target){alert('캡처할 콘텐츠가 없습니다');return;}

  // 로딩 표시
  const loadingDiv=document.createElement('div');
  loadingDiv.id='img-loading';
  loadingDiv.innerHTML='<div style="position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:9999;display:flex;align-items:center;justify-content:center"><div style="background:#fff;border-radius:12px;padding:28px 40px;text-align:center;font-size:14px;font-weight:700;color:#1e293b">🖼 이미지 생성 중...<br><span style="font-size:11px;color:#64748b;font-weight:400;margin-top:6px;display:block">잠시 기다려주세요</span></div></div>';
  document.body.appendChild(loadingDiv);

  // A4 가로 기준 (96dpi: 297mm = 1122px), 2배 해상도
  const A4_WIDTH_PX=1122;
  const SCALE=2;
  const contentW=target.offsetWidth;
  const contentH=target.scrollHeight;

  setTimeout(()=>{
    html2canvas(target,{
      scale:SCALE,
      useCORS:true,
      allowTaint:true,
      backgroundColor:'#ffffff',
      scrollX:0,
      scrollY:0,
      width:contentW,
      height:contentH,
      windowWidth:contentW,
      windowHeight:contentH,
      logging:false
    }).then(srcCanvas=>{
      // A4 가로 기준 최종 캔버스 생성 (가운데 정렬)
      const finalW=A4_WIDTH_PX*SCALE;
      const scaledContentW=srcCanvas.width;
      const scaledContentH=srcCanvas.height;

      // 콘텐츠 비율로 최종 높이 계산
      const finalH=Math.round(scaledContentH*(finalW/scaledContentW));

      const finalCanvas=document.createElement('canvas');
      finalCanvas.width=finalW;
      finalCanvas.height=finalH;

      const ctx=finalCanvas.getContext('2d');
      // 흰색 배경
      ctx.fillStyle='#ffffff';
      ctx.fillRect(0,0,finalW,finalH);

      // 가운데 정렬: x 오프셋 계산
      const drawW=Math.min(scaledContentW,finalW);
      const xOffset=Math.round((finalW-drawW)/2);

      // 콘텐츠를 가운데 배치
      ctx.drawImage(srcCanvas,0,0,scaledContentW,scaledContentH,xOffset,0,drawW,finalH);

      // PNG 다운로드
      const link=document.createElement('a');
      link.download=fileName;
      link.href=finalCanvas.toDataURL('image/png',1.0);
      link.click();

      // 인쇄헤더 다시 숨김
      printHeaders.forEach(el=>el.style.display='');
      document.body.removeChild(loadingDiv);
    }).catch(err=>{
      console.error(err);
      printHeaders.forEach(el=>el.style.display='');
      document.body.removeChild(loadingDiv);
      alert('이미지 저장 중 오류가 발생했습니다: '+err.message);
    });
  },100);
}

  if(!window.XLSX){alert('잠시 후 다시 시도해주세요');return;}
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(DB.accounts.map(a=>({코드:a.code,은행명:a.bank_name,계좌번호:a.account_no||'',별명:a.alias||'',기초잔액:a.initial_balance||0}))),'계좌내역');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(DB.loans.map(l=>({코드:l.code,은행명:l.bank_name,계좌번호:l.account_no||'',실행일:l.exec_date||'',만기일:l.maturity_date||'',대출원금:l.loan_principal||0,금리:l.rate||'',이자:l.interest_amount||0,대출잔액:l.loan_balance||0,담보:l.collateral||'',비고:l.memo||''}))),'대출내역');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(DB.sales.map(s=>({날짜:s.date,구분:s.type==='sale'?'매출':'입금',은행명:s.bank_name||'',계좌번호:s.account_no||'',항목:s.item||'',전잔액:s.prev_balance||0,금액:s.amount||0,최종잔액:s.final_balance||0}))),'매출입금');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(DB.deposits.map(d=>{const acc=DB.accounts.find(a=>a.id===d.account_id);return{날짜:d.date,코드:acc?acc.code:'',은행명:acc?acc.bank_name:'',유형:d.memo_type||'',전잔액:d.prev_balance||0,입금:d.in_amount||0,출금:d.out_amount||0,최종잔액:d.final_balance||0,상세:d.detail||'',비고:d.memo||''};})),'예금내역');
  XLSX.writeFile(wb,'일일시재보고_'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'.xlsx');
}
function trigImp(){document.getElementById('impf').click();}
function handleImp(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      if(wb.SheetNames.includes('계좌내역')){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets['계좌내역']);
        if(rows.length&&confirm(`계좌 ${rows.length}개를 불러올까요?`)){
          rows.forEach(r=>{if(r['은행명']&&!DB.accounts.find(a=>a.code===r['코드']))DB.accounts.push({id:gid(),code:r['코드']||nextCode(DB.accounts,'ACC'),bank_name:r['은행명'],account_no:r['계좌번호']||'',alias:r['별명']||'',initial_balance:r['기초잔액']||0});});
        }
      }
      svDB();rc();alert('불러오기 완료');
    }catch(err){alert('파일 오류: '+err.message);}
    ev.target.value='';
  };
  reader.readAsArrayBuffer(file);
}
function resetDB(){
  if(!confirm('모든 데이터를 초기화하시겠습니까?'))return;
  DB={accounts:[],loans:[],sales:[],deposits:[],settings:DB.settings};
  svDB();rc();
}

// 기존 데이터 seq 마이그레이션 (seq 없는 데이터에 순번 부여)
(function migrateSeq(){
  const grouped={};
  DB.deposits.forEach(d=>{
    if(d.seq) return; // 이미 seq 있으면 건너뜀
    const key=d.account_id+'_'+d.date;
    if(!grouped[key]) grouped[key]=[];
    grouped[key].push(d);
  });
  Object.values(grouped).forEach(list=>{
    // created_at 순으로 정렬 후 seq 부여
    list.sort((a,b)=>(a.created_at||'').localeCompare(b.created_at||''));
    list.forEach((d,i)=>d.seq=i+1);
  });
  if(Object.keys(grouped).length>0) svDB();
})();
